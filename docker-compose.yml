services:
  youtube-mcp:
    image: ghcr.io/chezyname/youtube-mcp:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - youtube-mcp