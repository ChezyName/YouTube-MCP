name: Builds all Binaries

on:
  push:
    tags:
      - 'v*'  # triggers on v1.0.0, v1.0.1, v2.0.0 etc
  release:
    types: [published]

jobs:
  binary-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install X11 dependencies
        run: sudo apt-get install -y libx11-dev

      - name: Build youtube-mcp binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -o dist/youtube-mcp-windows-amd64.exe main.go
          GOOS=linux   GOARCH=amd64 go build -o dist/youtube-mcp-linux-amd64 main.go
          GOOS=linux   GOARCH=arm64 go build -o dist/youtube-mcp-linux-arm64 main.go
          GOOS=darwin  GOARCH=amd64 go build -o dist/youtube-mcp-darwin-amd64 main.go
          GOOS=darwin  GOARCH=arm64 go build -o dist/youtube-mcp-darwin-arm64 main.go
      
      - name: Build token-grabber binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -o dist/token-grabber-windows-amd64.exe ./cwd/token-getter
          GOOS=linux   GOARCH=amd64 go build -o dist/token-grabber-linux-amd64 ./cwd/token-getter
          GOOS=linux   GOARCH=arm64 go build -o dist/token-grabber-linux-arm64 ./cwd/token-getter
          GOOS=darwin  GOARCH=amd64 go build -o dist/token-grabber-darwin-amd64 ./cwd/token-getter
          GOOS=darwin  GOARCH=arm64 go build -o dist/token-grabber-darwin-arm64 ./cwd/token-getter

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*