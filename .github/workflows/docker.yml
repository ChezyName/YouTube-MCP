name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'  # triggers on v1.0.0, v1.0.1, v2.0.0 etc
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/chezyname/youtube-mcp:latest
            ghcr.io/chezyname/youtube-mcp:${{ github.ref_name }}
  token-getter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install X11 dependencies
        run: sudo apt-get install -y libx11-dev

      - name: Build token-getter binaries
        run: |
          cd cwd/token-getter
          GOOS=windows GOARCH=amd64 go build -o ../dist/token-getter-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -o ../dist/token-getter-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -o ../dist/token-getter-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -o ../dist/token-getter-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -o ../dist/token-getter-darwin-arm64 .

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*