name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'  # triggers on v1.0.0, v1.0.1, v2.0.0 etc
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/chezyname/youtube-mcp:latest
            ghcr.io/chezyname/youtube-mcp:${{ github.ref_name }}